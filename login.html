<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Hub | Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2933;
            background:
                linear-gradient(rgba(7, 42, 43, 0.78), rgba(7, 42, 43, 0.78)),
                url("https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1600&q=80") center/cover;
        }

        .login-box {
            width: min(380px, 100%);
            padding: 30px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.25);
        }

        h1 {
            margin-bottom: 6px;
            color: #0f766e;
            font-size: 30px;
            text-align: center;
        }

        p {
            margin-bottom: 22px;
            color: #607080;
            text-align: center;
        }

        input {
            width: 100%;
            min-height: 46px;
            margin-bottom: 14px;
            padding: 0 13px;
            border: 1px solid #d5dce6;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #0f766e;
        }

        button {
            width: 100%;
            min-height: 46px;
            border: 0;
            border-radius: 8px;
            color: white;
            background: #0f766e;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .links {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 14px;
        }

        a {
            color: #0f766e;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Property Hub</h1>
        <p>Login to view houses for rent and purchase.</p>

        <form>
            <input type="text" placeholder="Username or Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="index.html">Back Home</a>
            <a href="regs.html">Create Account</a>
        </div>
    </div>
</body>
</html>
